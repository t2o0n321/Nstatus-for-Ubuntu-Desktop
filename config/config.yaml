# NStatus Network Monitor — Configuration
# Copy to ~/.config/nstatus/config.yaml and edit as needed.
# All path values support ~ expansion.

network:
  # Primary ping / WAN latency target
  ping_target: "8.8.8.8"
  # Fallback target used when primary returns no data
  ping_alt_target: "1.1.1.1"
  # Packets per measurement cycle (keep ≤ 20 to stay within fast_interval)
  ping_count: 10
  # Seconds between fast-loop runs (ping + DNS + gateway latency)
  fast_interval_seconds: 10
  # Seconds between slow-loop runs (throughput test)
  slow_interval_seconds: 600    # 10 minutes
  # Seconds between IP/ISP refresh
  ip_check_interval_seconds: 300  # 5 minutes
  # Hostname used for DNS latency measurement
  dns_target: "google.com"

ip_tracking:
  # Days of IP history to keep in the database
  history_days: 30
  # IP must be stable this many days to be labelled LIKELY_STATIC
  static_threshold_days: 7
  # This many actual IP transitions in history_days → labelled DYNAMIC
  dynamic_change_threshold: 3

paths:
  data_dir:        "~/.local/share/nstatus"
  log_dir:         "~/.local/share/nstatus/logs"
  state_file:      "~/.local/share/nstatus/state.json"
  db_file:         "~/.local/share/nstatus/nstatus.db"
  conky_data_file: "~/.local/share/nstatus/conky_data.txt"

throughput:
  # "speedtest" uses speedtest-cli  |  "iperf3" requires a server
  method: "speedtest"
  # Only used when method = "iperf3"
  iperf3_server: ""
  # Abort the test if it exceeds this many seconds
  timeout_seconds: 120

logging:
  level: "INFO"          # DEBUG | INFO | WARNING | ERROR
  max_bytes: 10485760    # 10 MB per log file
  backup_count: 3        # number of rotated log files to keep

# ── Cloudflare service monitoring ──────────────────────────────────────────
# Add your own services here. Both CDN and Tunnel endpoints are supported.
# Each entry requires 'url' and optionally 'name'.
# Leave 'endpoints' as an empty list ([]) to disable Cloudflare monitoring.
cloudflare:
  endpoints:
    - name: "Web"
      url:  "https://example.com"
    # - name: "API"
    #   url:  "https://api.example.com/health"
    # - name: "Dashboard"
    #   url:  "https://dash.example.com"

  # How often to probe each endpoint (seconds)
  check_interval_seconds: 60

  # Maximum seconds to wait for a single HTTP response
  timeout_seconds: 10
