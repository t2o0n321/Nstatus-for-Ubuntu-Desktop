--[[
  NStatus Conky Widget — nstatus.conf
  ─────────────────────────────────────────────────────────────────────
  Reads ~/.local/share/nstatus/conky_data.txt (written by the nstatus
  daemon) and renders it as a transparent desktop overlay.

  Customisation tips:
    gap_x / gap_y   — move the widget (pixels from the chosen corner)
    alignment       — top_right | top_left | bottom_right | bottom_left
    font            — any monospace font installed on the system
    own_window_argb_value — 0 (fully transparent) … 255 (opaque)
  ─────────────────────────────────────────────────────────────────────
]]

conky.config = {
    -- ── Behaviour ───────────────────────────────────────────────── --
    -- background = false so systemd can track and restart the process.
    background         = false,
    update_interval    = 5,       -- seconds between redraws
    total_run_times    = 0,       -- 0 = run forever

    -- ── Window ──────────────────────────────────────────────────── --
    own_window               = true,
    own_window_type          = 'desktop',
    own_window_hints         = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_transparent   = false,
    own_window_argb_visual   = true,
    own_window_argb_value    = 210,    -- 0-255; higher = more opaque
    own_window_colour        = '080810',

    -- ── Positioning (top-right; adjust gap_x/gap_y as needed) ───── --
    alignment = 'top_right',
    gap_x     = 20,
    gap_y     = 50,

    -- ── Dimensions ──────────────────────────────────────────────── --
    minimum_width  = 290,
    maximum_width  = 290,
    minimum_height = 10,

    -- ── Font ────────────────────────────────────────────────────── --
    -- DejaVu Sans Mono ships with Ubuntu; adjust size to taste.
    font      = 'DejaVu Sans Mono:size=9',
    use_xft   = true,
    xftalpha  = 1,

    -- ── Colours (defaults — overridden inline in the text block) ─── --
    default_color = 'cccccc',
    color1        = '7986cb',   -- section headers (indigo)
    color2        = '00e676',   -- good / green
    color3        = 'ffca28',   -- warning / yellow
    color4        = 'ff5252',   -- bad / red
    color5        = '555555',   -- dim

    -- ── Anti-flicker ────────────────────────────────────────────── --
    double_buffer  = true,

    -- ── Borders / decorations off ────────────────────────────────── --
    draw_borders  = false,
    draw_outline  = false,
    draw_shades   = false,
    border_width  = 0,
    border_inner_margin = 6,
};

--[[
  ${execpi N cmd} — run cmd every N seconds and render its output,
  interpreting Conky markup tags (colours, variables).

  The daemon writes conky_data.txt atomically, so this is always a
  complete, consistent snapshot.
]]
conky.text = [[
${execpi 5 cat ${HOME}/.local/share/nstatus/conky_data.txt 2>/dev/null || echo "${color #ff5252}NStatus daemon not running"}
]];
