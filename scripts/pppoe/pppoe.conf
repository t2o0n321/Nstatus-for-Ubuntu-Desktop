# ─────────────────────────────────────────────────────────────────────────────
# NStatus — PPPoE Reconfiguration Config
#
# Edit this file to match your ISP credentials and hardware, then
# double-click pppoe_reconfigure.sh to apply.
# ─────────────────────────────────────────────────────────────────────────────

# ── Hardware ──────────────────────────────────────────────────────────────────
# Physical Ethernet interface that is wired directly to the modem.
# Find yours with:  ip link show
PPPOE_IFACE="eth0"

# ── ISP Credentials ───────────────────────────────────────────────────────────
PPPOE_USERNAME="username@isp.net"
PPPOE_PASSWORD="yourpassword"

# ── Connection Method ─────────────────────────────────────────────────────────
# "pppd"  — writes /etc/ppp/peers/ + uses pon/poff  (recommended for bare metal)
# "nmcli" — delegates to NetworkManager (use if your desktop manages connections)
PPPOE_METHOD="pppd"

# ── pppd settings (only used when PPPOE_METHOD=pppd) ─────────────────────────
# Name of the peer file under /etc/ppp/peers/
# Run pppoeconf once to create it, then this script updates credentials only.
PPPOE_PEER_NAME="dsl-provider"

# Extra pppd options appended to the peer file (space-separated).
# Leave empty for sane defaults (usepeerdns, defaultroute, persist, noauth).
PPPOE_EXTRA_OPTS=""

# ── NetworkManager settings (only used when PPPOE_METHOD=nmcli) ──────────────
# The NM connection name shown by: nmcli connection show
PPPOE_NM_CONNECTION="DSL Connection 1"
