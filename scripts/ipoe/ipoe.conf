# ─────────────────────────────────────────────────────────────────────────────
# NStatus — IPoE Reconfiguration Config
#
# IPoE (IP over Ethernet) — the ISP assigns your IP directly on the Ethernet
# interface, either via DHCP or a fixed static IP.  No PPP dial-up involved.
#
# Edit this file, then double-click ipoe_reconfigure.sh to apply.
# ─────────────────────────────────────────────────────────────────────────────

# ── Hardware ──────────────────────────────────────────────────────────────────
# Physical Ethernet interface wired to the modem / ONT.
# Find yours with:  ip link show
IPOE_IFACE="eth0"

# ── IP Assignment Mode ────────────────────────────────────────────────────────
# "dhcp"   — ISP assigns IP automatically (most common IPoE)
# "static" — ISP gave you a fixed IP address
IPOE_MODE="dhcp"

# ── Connection Method ─────────────────────────────────────────────────────────
# "nmcli"    — NetworkManager  (recommended for Ubuntu Desktop)
# "dhclient" — classic DHCP client, no NetworkManager needed  (DHCP only)
# "raw"      — bare  ip / resolvconf  commands                (static only)
IPOE_METHOD="nmcli"

# ── NetworkManager connection name (IPOE_METHOD=nmcli only) ──────────────────
# Find yours with:  nmcli connection show
IPOE_NM_CONNECTION="Wired connection 1"

# ── Static IP settings (IPOE_MODE=static only) ───────────────────────────────
# Address must include prefix length (e.g. /24).
IPOE_ADDRESS="203.0.113.42/24"
IPOE_GATEWAY="203.0.113.1"
IPOE_DNS1="168.95.1.1"
IPOE_DNS2="8.8.8.8"
